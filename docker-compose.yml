services:
  postgres:
    image: postgres:16-alpine
    container_name: gyokurinken-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: gyokurinken
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "15432:5432"
    volumes:
      - gyokurinken-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d gyokurinken"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  gyokurinken-postgres-data:
